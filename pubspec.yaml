name: sonexa
description: "Sonexa - A music player for your own servers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  scrollable_positioned_list: ^0.3.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # Database
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0

  # Audio playback
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.1.0
  media_kit: any
  media_kit_libs_linux: any
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  rxdart: ^0.28.0

  # Navigation
  go_router: ^14.8.1

  # Functional error handling
  fpdart: ^1.1.0

  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  equatable: ^2.0.7
  collection: ^1.19.1
  intl: ^0.20.2
  logger: ^2.5.0

  # Desktop
  smtc_windows: ^0.1.3
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/splash_foreground.png
