name: ohmymusic
description: "OhMyMusic - 跨平台 Navidrome 音乐播放器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # 数据模型
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 网络请求
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # 数据库 (Drift = 类型安全 SQLite ORM)
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0

  # 音频播放
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: any
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  rxdart: ^0.28.0

  # 导航
  go_router: ^14.8.1

  # 函数式错误处理
  fpdart: ^1.1.0

  # 工具
  crypto: ^3.0.6
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  equatable: ^2.0.7
  collection: ^1.19.1
  intl: ^0.19.0
  logger: ^2.5.0

  # 桌面 (Windows)
  smtc_windows: ^0.1.3
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
